version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://splat_qr:secret@db:5432/splat_qr
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/data/uploads
      - geoip:/app/data
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: splat_qr
      POSTGRES_USER: splat_qr
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splat_qr"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  pgdata:
  uploads:
  geoip:
