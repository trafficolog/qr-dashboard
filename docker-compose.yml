name: splat-qr-dashboard
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-splat_qr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-splat_qr}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-splat_qr}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-splat_qr}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
 
  app:
    build:
      context: .
      # defaults to last stage (runner)
    image: splat-qr:local
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-splat_qr}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-splat_qr}
      OTP_PEPPER: ${OTP_PEPPER:?OTP_PEPPER is required. Set it in .env}
      CSRF_SECRET: ${CSRF_SECRET:?CSRF_SECRET is required. Set it in .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost:${APP_PORT:-3000}}
      NUXT_PUBLIC_APP_NAME: ${NUXT_PUBLIC_APP_NAME:-SPLAT QR Service}
      NUXT_PUBLIC_MCP_SERVER_URL: ${NUXT_PUBLIC_MCP_SERVER_URL:-}
      NUXT_PUBLIC_CSRF_HEADER_NAME: ${NUXT_PUBLIC_CSRF_HEADER_NAME:-X-CSRF-Token}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@splatglobal.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAXMIND_DB_PATH: ${MAXMIND_DB_PATH:-/app/data/GeoLite2-City.mmdb}
      PROXY_SCHEME_ENABLED: ${PROXY_SCHEME_ENABLED:-0}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.1,::1}
    volumes:
      - uploads:/app/data/uploads
      - geoip:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  geoip:
